<!DOCTYPE html>
<html>
<head>
    <title>Five Nights at Freddys 1: Redrawn</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div id="game-wrapper">
        <div id="game">
            <img src="images/office-background.png" alt="office-backgrond">

            <img id="left-door-button" src="images/left-door-button-off.png" alt="left-door-button-off">
            <img id="left-light-button" src="images/left-light-button-off.png" alt="left-light-button-off">
            <img id="right-door-button" src="images/right-door-button-off.png" alt="right-door-button-off">
            <img id="right-light-button" src="images/right-light-button-off.png" alt="right-light-button-off">

            <img id="left-doorway-light" src="images/left-doorway-light.png" alt="left-doorway-light">
            <img id="left-doorway-bonnie" src="images/left-doorway-bonnie.png" alt="left-doorway-bonnie">
            <img id="right-doorway-light" src="images/right-doorway-light.png" alt="right-doorway-light">

            <img id="left-door" src="images/left-door.png" alt="left-door">
            <img id="left-door-overlay" src="images/left-door-overlay.png" alt="left-door-overlay">
            <img id="right-door" src="images/right-door.png" alt="right-door">
            <img id="right-door-overlay" src="images/right-door-overlay.png" alt="right-door-overlay">


            <img id="left-window-light" src="images/left-window-light.png" alt="left-window-light">
            <img id="left-window-bonnie" src="images/left-window-bonnie.png" alt="left-window-bonnie">
            <img id="right-window-light" src="images/right-window-light.png" alt="right-window-light">
            <img id="right-window-chica" src="images/right-window-chica.png" alt="right-window-chica">

            <img id="monitor-button" src="images/ui/monitor-button.png" alt="monitor-button">
            <img id="monitor" src="images/monitor/monitor-frame0.png" alt="monitor">

            <img id="camera-map" src="images/monitor/camera-map.png" alt="camera-map">
            <div id="camera-buttons-div">
                <img id="cam-1a-button" src="images/monitor/cam-1a-button-on.png" alt="cam-1a-button">
                <img id="cam-1b-button" src="images/monitor/cam-1b-button-off.png" alt="cam-1b-button">
                <img id="cam-1c-button" src="images/monitor/cam-1c-button-off.png" alt="cam-1c-button">
                <img id="cam-2a-button" src="images/monitor/cam-2a-button-off.png" alt="cam-2a-button">
                <img id="cam-2b-button" src="images/monitor/cam-2b-button-off.png" alt="cam-2b-button">
                <img id="cam-3-button"  src="images/monitor/cam-3-button-off.png" alt="cam-3-button">
                <img id="cam-4a-button" src="images/monitor/cam-4a-button-off.png" alt="cam-4a-button">
                <img id="cam-4b-button" src="images/monitor/cam-4b-button-off.png" alt="cam-4b-button">
                <img id="cam-5-button"  src="images/monitor/cam-5-button-off.png" alt="cam-5-button">
                <img id="cam-6-button"  src="images/monitor/cam-6-button-off.png" alt="cam-6-button">
                <img id="cam-7-button"  src="images/monitor/cam-7-button-off.png" alt="cam-7-button">
            </div>
            <img id="camera-background" src="images/monitor/cam-1a.png" alt="camera-background">
        </div>
    </div>
</body>
</html>
